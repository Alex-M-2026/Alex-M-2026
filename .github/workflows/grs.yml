name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&theme=algolia&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=algolia&layout=compact&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin card 1
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Number-Guessing-Game&theme=algolia
          path: profile/pin-number-guessing-game.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin card 2
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=ASCII-Art-Generator&theme=algolia
          path: profile/pin-ascii-art-generator.svg
          token: ${{ secrets.STATS_TOKEN }}
      
      - name: Generate pin card 3
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Space-Asteroids&theme=algolia
          path: profile/pin-space-asteroids.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin card 4
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Notes-Extension&theme=algolia
          path: profile/pin-notes-extension.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin card 5
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Stopwatch&theme=algolia
          path: profile/pin-stopwatch.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin card 6
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Calculator&theme=algolia
          path: profile/pin-calculator.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin card 7
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Coin-Clicker&theme=algolia
          path: profile/pin-coin-clicker.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin card 8
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Password-Generator&theme=algolia
          path: profile/pin-password-generator.svg
          token: ${{ secrets.STATS_TOKEN }}
      
      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
